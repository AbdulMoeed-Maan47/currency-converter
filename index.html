<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency Converter</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Currency Converter</h1>
      <form>
        <div class="amount">
          <p>Enter Amount:</p>
          <input type="text" value="100" />
        </div>
        <div class="from">
          <p>From</p>
          <div class="select-contaier">
            <img src="https://flagsapi.com/US/flat/64.png" alt="country-flag" />
            <select name="from" id="from">
              <option value="USD" selected>USD</option>
              <option value="PKR">PKR</option>
              <option value="EUR">EUR</option>
              <option value="CNY">CNY</option>
            </select>
          </div>
        </div>
        <i class="fa-solid fa-arrow-right-arrow-left"></i>
        <div class="to">
          <p>To</p>
          <div class="select-contaier">
            <img src="https://flagsapi.com/PK/flat/64.png" alt="country-flag" />
            <select name="to" id="to">
              <option value="USD">USD</option>
              <option value="PKR" selected>PKR</option>
              <option value="EUR">EUR</option>
              <option value="CNY">CNY</option>
            </select>
          </div>
        </div>
        <div class="msg">1 USD = 300 PKR</div>
        <button class="btn">Convert Currency</button>
      </form>
    </div>
    <script src="js/script.js"></script>
  </body>
</html>
